<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Sky Library | Virtual Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #818cf8;
            --secondary: #c084fc;
            --aurora-teal: rgba(45, 212, 191, 0.3);
            --aurora-purple: rgba(139, 92, 246, 0.3);
            --bg-space: #0f172a;
            --text-main: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            background: var(--bg-space);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BACKGROUND ANIMATION --- */
        #universe {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(ellipse at bottom, #1e293b 0%, #020617 100%);
        }

        .aurora {
            position: absolute; width: 200%; height: 100%; top: -10%; left: -50%;
            background: repeating-linear-gradient(90deg, transparent 0%, var(--aurora-teal) 15%, transparent 30%, var(--aurora-purple) 45%, transparent 60%);
            filter: blur(100px); opacity: 0.5; animation: auroraFlow 20s infinite linear;
        }

        @keyframes auroraFlow { from { transform: translateX(-20%); } to { transform: translateX(0%); } }

        /* --- LANDING PAGE --- */
        #landingPage {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            z-index: 2000; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            transition: 1s cubic-bezier(0.7, 0, 0.3, 1); text-align: center;
        }
        #landingPage.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        .welcome-card h1 {
            font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 15px;
            background: linear-gradient(to bottom right, #fff, var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- MAIN CONTENT --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; display: none; opacity: 0; transition: 0.5s; }
        .container.active { display: block; opacity: 1; }

        .glass-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 12px 28px; border-radius: 10px;
            cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        .glass-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(129, 140, 248, 0.5); }

        /* --- BOOK CARDS --- */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; margin-top: 40px; }
        
        .book-card {
            background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center; transition: 0.4s;
            backdrop-filter: blur(10px);
        }
        .book-card:hover { border-color: var(--primary); transform: translateY(-10px); background: rgba(255, 255, 255, 0.08); }

        .cover-wrapper {
            width: 100%; height: 280px; border-radius: 14px; overflow: hidden; margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); background: #1e293b; position: relative;
        }

        .cover-image { width: 100%; height: 100%; object-fit: cover; }
        
        .auto-cover-placeholder {
            width: 100%; height: 100%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 15px; text-align: center;
        }

        .actions { display: flex; gap: 8px; justify-content: center; margin-top: 15px; }
        .btn-small { flex: 1; padding: 8px; font-size: 0.7rem; border-radius: 8px; cursor: pointer; border: none; color: white; font-weight: 600; }
        .btn-edit { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .btn-delete { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.9);
            display: none; justify-content: center; align-items: center; z-index: 3000;
            backdrop-filter: blur(10px);
        }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        
        input { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; 
        }
        .file-input-label {
            display: block; width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px;
            background: rgba(129, 140, 248, 0.1); border: 1px dashed var(--primary);
            text-align: center; cursor: pointer; font-size: 0.9rem; color: var(--primary);
        }
        label { font-size: 0.75rem; color: var(--primary); font-weight: 600; margin-left: 5px; text-transform: uppercase; }
        
        #previewContainer {
            width: 100px; height: 140px; margin: 10px auto; border-radius: 8px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.2); display: none;
        }
        #previewImg { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="universe"><div class="aurora"></div></div>

    <div id="landingPage">
        <div class="welcome-card">
            <p style="letter-spacing: 5px; color: var(--primary); font-weight: 800; text-transform: uppercase;">Celestial Archive</p>
            <h1>Aurora Sky Library</h1>
            <p style="margin-bottom: 40px; opacity: 0.7;">Upload and organize your collection locally.</p>
            <button class="glass-btn" onclick="enterApp()">Open Library</button>
        </div>
    </div>

    <div class="container" id="mainApp">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <div>
                <h2 style="font-family: 'Playfair Display'; font-size: 2rem;">Main Catalog</h2>
                <p style="opacity: 0.6;">Stored in your local browser vault</p>
            </div>
            <button class="glass-btn" onclick="openModal()">+ Add Book</button>
        </header>
        <div class="book-grid" id="bookGrid"></div>
    </div>

    <!-- MODAL -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-bottom: 15px;">New Book</h3>
            <input type="hidden" id="editId">
            
            <label>Title</label>
            <input type="text" id="inJudul" placeholder="Book Title">
            
            <label>Author</label>
            <input type="text" id="inPenulis" placeholder="Author Name">
            
            <label>Category</label>
            <input type="text" id="inKategori" placeholder="e.g. Novel, History">
            
            <label>Book Cover</label>
            <label for="inCoverFile" class="file-input-label" id="fileLabel">📁 Click to Upload Cover Image</label>
            <input type="file" id="inCoverFile" accept="image/*" style="display: none;" onchange="handleFileSelect(this)">
            
            <div id="previewContainer">
                <img id="previewImg" src="">
            </div>
            
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="glass-btn" style="flex: 2;" onclick="saveBook()">Save Archive</button>
                <button class="glass-btn" style="background: #334155; flex: 1;" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let libraryData = JSON.parse(localStorage.getItem('aurora_db_v3')) || [];
        let selectedImageData = ""; // Variable to store base64 image

        function enterApp() {
            document.getElementById('landingPage').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('mainApp').classList.add('active');
                render();
            }, 600);
        }

        // Fungsi membaca file gambar dan mengubah ke Base64
        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImageData = e.target.result;
                    document.getElementById('previewImg').src = selectedImageData;
                    document.getElementById('previewContainer').style.display = 'block';
                    document.getElementById('fileLabel').innerText = "✅ Image Selected";
                };
                reader.readAsDataURL(file);
            }
        }

        function render() {
            const grid = document.getElementById('bookGrid');
            grid.innerHTML = '';
            
            if (libraryData.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5; padding: 40px;">No books archived yet.</p>`;
                return;
            }

            libraryData.forEach(book => {
                const coverContent = book.coverData 
                    ? `<img src="${book.coverData}" class="cover-image">`
                    : `<div class="auto-cover-placeholder" style="background: ${book.bg}">
                        <div style="font-family: 'Playfair Display'; font-weight: bold;">${book.judul}</div>
                        <div style="font-size: 0.7rem; opacity: 0.8;">${book.penulis}</div>
                       </div>`;

                grid.innerHTML += `
                    <div class="book-card">
                        <div class="cover-wrapper">${coverContent}</div>
                        <h4 style="font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${book.judul}</h4>
                        <p style="font-size: 0.75rem; opacity: 0.5;">${book.kategori}</p>
                        <div class="actions">
                            <button class="btn-small btn-edit" onclick="editBook('${book.id}')">Edit</button>
                            <button class="btn-small btn-delete" onclick="deleteBook('${book.id}')">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(id = null) {
            document.getElementById('bookModal').style.display = 'flex';
            selectedImageData = ""; // Reset image state
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('fileLabel').innerText = "📁 Click to Upload Cover Image";
            
            if(id) {
                const book = libraryData.find(b => b.id === id);
                document.getElementById('modalTitle').innerText = 'Edit Book';
                document.getElementById('editId').value = id;
                document.getElementById('inJudul').value = book.judul;
                document.getElementById('inPenulis').value = book.penulis;
                document.getElementById('inKategori').value = book.kategori;
                if(book.coverData) {
                    selectedImageData = book.coverData;
                    document.getElementById('previewImg').src = selectedImageData;
                    document.getElementById('previewContainer').style.display = 'block';
                }
            } else {
                document.getElementById('modalTitle').innerText = 'New Book Entry';
                document.getElementById('editId').value = '';
                document.getElementById('inJudul').value = '';
                document.getElementById('inPenulis').value = '';
                document.getElementById('inKategori').value = '';
            }
        }

        function closeModal() { document.getElementById('bookModal').style.display = 'none'; }

        function saveBook() {
            const id = document.getElementById('editId').value;
            const judul = document.getElementById('inJudul').value;
            const penulis = document.getElementById('inPenulis').value;
            const kategori = document.getElementById('inKategori').value;

            if(!judul || !penulis) return alert("Title and Author are required!");

            if(id) {
                const index = libraryData.findIndex(b => b.id === id);
                libraryData[index] = { ...libraryData[index], judul, penulis, kategori, coverData: selectedImageData };
            } else {
                const grads = ['linear-gradient(135deg, #4338ca, #6366f1)', 'linear-gradient(135deg, #064e3b, #10b981)', 'linear-gradient(135deg, #7c2d12, #f97316)'];
                libraryData.push({
                    id: Date.now().toString(),
                    judul, penulis, kategori,
                    coverData: selectedImageData,
                    bg: grads[Math.floor(Math.random() * grads.length)]
                });
            }

            localStorage.setItem('aurora_db_v3', JSON.stringify(libraryData));
            render();
            closeModal();
        }

        function editBook(id) { openModal(id); }

        function deleteBook(id) {
            if(confirm('Delete from archive?')) {
                libraryData = libraryData.filter(b => b.id !== id);
                localStorage.setItem('aurora_db_v3', JSON.stringify(libraryData));
                render();
            }
        }
    </script>
</body>
</html>
